name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, test, build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: companion
          POSTGRES_DB: companion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companion -d companion"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build API
        run: pnpm --filter @companion/api build

      - name: Verify API production start
        run: |
          DATABASE_URL=postgres://companion:companion@127.0.0.1:5432/companion \
          COMPANION_API_PORT=18081 \
          pnpm --filter @companion/api start &
          api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18081/health; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Build web
        run: pnpm --filter @companion/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: Build CLI
        run: pnpm --filter @companion/cli build
