name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build API
        run: pnpm --filter @companion/api build

      - name: Build web
        run: pnpm --filter @companion/web build
        env:
          COMPANION_API_URL: http://127.0.0.1:13301
          COMPANION_WEB_URL: http://127.0.0.1:13300
          BETTER_AUTH_URL: http://127.0.0.1:13301
          NEXT_PUBLIC_COMPANION_API_URL: http://127.0.0.1:13301
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: RSC smoke
        run: pnpm smoke:rsc

      - name: Build CLI
        run: pnpm --filter @companion/cli build
