name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgres://companion:companion@127.0.0.1:5432/companion

jobs:
  fast:
    name: Fast checks (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-${{ matrix.node-version }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check bundled Companion skill version
        run: pnpm --filter @companion/companion-skill check:version-bump

      - name: Set up Python
        if: matrix.node-version == 22
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Companion skill guard tests (Python)
        if: matrix.node-version == 22
        run: python -m unittest discover -s packages/companion-skill/skill/scripts -p 'test_*.py'

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Lint
        run: pnpm lint

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  build:
    name: Build and API smoke (Node 22)
    runs-on: ubuntu-latest
    needs: fast
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: companion
          POSTGRES_DB: companion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companion -d companion"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-22-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @companion/api build

      - name: Build web
        run: pnpm --filter @companion/web build
        env:
          COMPANION_API_URL: http://127.0.0.1:13301
          COMPANION_WEB_URL: http://127.0.0.1:13300
          BETTER_AUTH_URL: http://127.0.0.1:13301
          NEXT_PUBLIC_COMPANION_API_URL: http://127.0.0.1:13301
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: Build CLI
        run: pnpm --filter @companion/cli build

      - name: Build Railway Docker images
        run: |
          docker build \
            --file deploy/railway/Dockerfile.backend \
            --build-arg RAILWAY_SERVICE_NAME=api \
            --tag companion-api:ci \
            .
          docker build \
            --file deploy/railway/Dockerfile.backend \
            --build-arg RAILWAY_SERVICE_NAME=worker \
            --tag companion-worker:ci \
            .
          docker build \
            --file deploy/railway/Dockerfile.web \
            --build-arg COMPANION_API_URL=http://127.0.0.1:18082 \
            --build-arg COMPANION_WEB_URL=http://127.0.0.1:18080 \
            --build-arg NEXT_PUBLIC_COMPANION_API_BASE=http://127.0.0.1:18080/v1 \
            --tag companion-web:ci \
            .

      - name: Smoke Railway Docker images
        run: |
          set -euo pipefail

          for image in companion-api:ci companion-worker:ci companion-web:ci; do
            test "$(docker image inspect --format '{{.Config.User}}' "$image")" = "node"
          done
          docker run --rm companion-api:ci test -f dist/runtime-role-grants.sql

          docker run --rm --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            companion-api:ci node dist/migrate.js

          worker_id="$(docker run -d -e COMPANION_BILLING_MODE=off companion-worker:ci)"
          api_id=""
          web_id=""
          cleanup() {
            docker rm -f "$web_id" "$api_id" "$worker_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          sleep 2
          test "$(docker inspect --format '{{.State.Running}}' "$worker_id")" = "true"

          api_id="$(docker run -d --network host \
            -e PORT=18082 \
            -e COMPANION_API_HOST=0.0.0.0 \
            -e DATABASE_URL="$DATABASE_URL" \
            -e COMPANION_WEB_URL=http://127.0.0.1:18080 \
            -e COMPANION_API_URL=http://127.0.0.1:18080 \
            -e BETTER_AUTH_URL=http://127.0.0.1:18080 \
            -e BETTER_AUTH_SECRET=ci-railway-smoke-better-auth-secret-with-enough-entropy \
            -e EMAIL_PROVIDER=log \
            companion-api:ci)"

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18082/health >/dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18082/health

          web_id="$(docker run -d --network host \
            -e PORT=18080 \
            -e HOSTNAME=0.0.0.0 \
            companion-web:ci)"

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/login >/dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18080/login >/dev/null

      - name: Smoke CLI
        run: |
          node cli/dist/index.js --version
          node cli/dist/index.js skills --help

      - name: Migrate database
        run: pnpm db:migrate

      - name: Start API and smoke test
        run: |
          DATABASE_URL="$DATABASE_URL" \
          COMPANION_API_PORT=18081 \
          BETTER_AUTH_SECRET=ci-api-smoke-better-auth-secret-with-enough-entropy-for-tests \
          BETTER_AUTH_URL=http://127.0.0.1:18081 \
          COMPANION_API_URL=http://127.0.0.1:18081 \
          pnpm --filter @companion/api start &
          api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT
          bash scripts/ci-api-smoke.sh
        env:
          COMPANION_API_URL: http://127.0.0.1:18081

  integration:
    name: Integration smoke (Node 22)
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: companion
          POSTGRES_DB: companion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companion -d companion"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-22-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @companion/api build

      - name: Build web
        run: pnpm --filter @companion/web build
        env:
          COMPANION_API_URL: http://127.0.0.1:13301
          COMPANION_WEB_URL: http://127.0.0.1:13300
          BETTER_AUTH_URL: http://127.0.0.1:13301
          NEXT_PUBLIC_COMPANION_API_URL: http://127.0.0.1:13301
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: Validate Docker Compose
        run: docker compose config

      - name: Migrate database
        run: pnpm db:migrate

      - name: Tenant, Skills, and Secrets integration
        run: pnpm test:integration
        env:
          COMPANION_SECRETS_MASTER_KEY: CQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQk=

      - name: RunSkill database integration
        run: pnpm --filter @companion/api test -- src/runsDb.integration.test.ts src/preTenantRls.integration.test.ts
        env:
          RUN_SKILL_DB_INTEGRATION: "1"

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: RSC smoke and critical browser flows
        run: pnpm smoke:rsc
        env:
          CI_USE_GHA_POSTGRES: "1"
          DATABASE_URL: postgres://companion:companion@127.0.0.1:5432/companion
          RUN_PLAYWRIGHT: "1"

      - name: Upload RSC smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rsc-smoke-logs
          path: |
            .context/rsc-smoke/
            playwright-report/
            test-results/
          if-no-files-found: ignore
