name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgres://companion:companion@127.0.0.1:5432/companion
  DATABASE_MIGRATION_URL: postgres://companion:companion@127.0.0.1:5432/companion
  DATABASE_RUNTIME_URL: postgres://companion_runtime:companion-runtime@127.0.0.1:5432/companion

jobs:
  scope:
    name: Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs: ${{ steps.scope.outputs.docs }}
      design: ${{ steps.scope.outputs.design }}
      quality: ${{ steps.scope.outputs.quality }}
      build: ${{ steps.scope.outputs.build }}
      database: ${{ steps.scope.outputs.database }}
      browser: ${{ steps.scope.outputs.browser }}
      containers: ${{ steps.scope.outputs.containers }}
      dependencies: ${{ steps.scope.outputs.dependencies }}
      skill: ${{ steps.scope.outputs.skill }}
      full: ${{ steps.scope.outputs.full }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify change risk
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: >-
          node scripts/ci-scope.mjs
          --event "$EVENT_NAME"
          --base "${BASE_SHA:-$GITHUB_SHA}"
          --head "${HEAD_SHA:-$GITHUB_SHA}"
          --github-output "$GITHUB_OUTPUT"

  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    needs: scope
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Test CI scope classifier
        run: node --test scripts/ci-scope.test.mjs scripts/ci-playwright-policy.test.mjs scripts/ci-gate.test.mjs

      - name: Validate GitHub Actions workflows
        run: >-
          docker run --rm
          --volume "$PWD:/repo"
          --workdir /repo
          rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
          -color

      - name: Validate shell scripts
        run: git ls-files -z '*.sh' | xargs -0 shellcheck

      - name: Scan changed history for secrets
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          MERGE_BASE: ${{ github.event.merge_group.base_sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            schedule|workflow_dispatch) log_opts="$GITHUB_SHA" ;;
            pull_request) log_opts="${PR_BASE}..${PR_HEAD}" ;;
            merge_group) log_opts="${MERGE_BASE}..${GITHUB_SHA}" ;;
            push)
              if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then log_opts="${GITHUB_SHA}^..${GITHUB_SHA}"; else log_opts="${BEFORE_SHA}..${GITHUB_SHA}"; fi
              ;;
            *) log_opts="${GITHUB_SHA}^..${GITHUB_SHA}" ;;
          esac
          docker run --rm \
            --volume "$PWD:/repo" \
            --workdir /repo \
            zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source . --redact --no-banner --log-opts="$log_opts"

      - name: Set up pnpm
        if: needs.scope.outputs.skill == 'true' || needs.scope.outputs.design == 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        if: needs.scope.outputs.skill == 'true' || needs.scope.outputs.design == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Check bundled Companion skill version
        if: needs.scope.outputs.skill == 'true'
        run: pnpm --filter @companion/companion-skill check:version-bump

      - name: Set up Python
        if: needs.scope.outputs.skill == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Test bundled Companion skill guards
        if: needs.scope.outputs.skill == 'true'
        run: python -m unittest discover -s packages/companion-skill/skill/scripts -p 'test_*.py'

      - name: Validate DESIGN.md
        if: needs.scope.outputs.design == 'true'
        run: pnpm design:lint

  quality:
    name: Quality Node 22
    runs-on: ubuntu-latest
    needs: scope
    if: needs.scope.outputs.quality == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore quality cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-quality-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}-${{ github.run_attempt }}
          restore-keys: |
            turbo-quality-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-quality-${{ runner.os }}-22-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run affected quality checks
        if: github.event_name == 'pull_request' && needs.scope.outputs.full != 'true'
        run: pnpm exec turbo run lint typecheck test --affected --continue=dependencies-successful --output-logs=errors-only

      - name: Run full quality checks
        if: github.event_name != 'pull_request' || needs.scope.outputs.full == 'true'
        run: pnpm ci:quality --output-logs=errors-only

  application-build:
    name: Application Build
    runs-on: ubuntu-latest
    needs: scope
    if: needs.scope.outputs.build == 'true'
    timeout-minutes: 15
    env:
      COMPANION_API_URL: http://127.0.0.1:13301
      COMPANION_WEB_URL: http://127.0.0.1:13300
      BETTER_AUTH_URL: http://127.0.0.1:13301
      NEXT_PUBLIC_COMPANION_API_URL: http://127.0.0.1:13301
      NEXT_PUBLIC_COMPANION_API_BASE: http://127.0.0.1:13300/v1
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore application build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-build-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}-${{ github.run_attempt }}
          restore-keys: |
            turbo-build-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-build-${{ runner.os }}-22-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build applications
        run: pnpm exec turbo run build --output-logs=errors-only

      - name: Smoke CLI
        run: |
          node cli/dist/index.js --version
          node cli/dist/index.js skills --help

  database-integration:
    name: Database Integration
    runs-on: ubuntu-latest
    needs: scope
    if: needs.scope.outputs.database == 'true'
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: companion
          POSTGRES_DB: companion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companion -d companion"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create NOBYPASSRLS runtime database role
        run: |
          docker run --rm --network host postgres:16-alpine \
            psql "$DATABASE_MIGRATION_URL" -v ON_ERROR_STOP=1 -c \
            "DO \$\$ BEGIN
               IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'companion_runtime') THEN
                 CREATE ROLE companion_runtime LOGIN PASSWORD 'companion-runtime'
                   NOSUPERUSER NOBYPASSRLS NOINHERIT;
               END IF;
             END \$\$;
             ALTER ROLE companion_runtime NOSUPERUSER NOBYPASSRLS NOINHERIT;"

      - name: Build API
        run: pnpm --filter @companion/api build

      - name: Apply migrations and runtime grants
        run: pnpm --filter @companion/api migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_RUNTIME_URL }}
          DATABASE_RUNTIME_ROLE: companion_runtime

      - name: Test tenant, Skills, labels, secrets, and RLS
        run: pnpm test:integration
        env:
          COMPANION_SECRETS_MASTER_KEY: CQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQk=

      - name: Start API and smoke test
        run: |
          DATABASE_URL="$DATABASE_RUNTIME_URL" \
          DATABASE_MIGRATION_URL="$DATABASE_MIGRATION_URL" \
          DATABASE_RUNTIME_ROLE=companion_runtime \
          COMPANION_API_PORT=18081 \
          BETTER_AUTH_SECRET=ci-api-smoke-better-auth-secret-with-enough-entropy-for-tests \
          BETTER_AUTH_URL=http://127.0.0.1:18081 \
          COMPANION_API_URL=http://127.0.0.1:18081 \
          pnpm --filter @companion/api start &
          api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT
          bash scripts/ci-api-smoke.sh
        env:
          COMPANION_API_URL: http://127.0.0.1:18081

  railway-containers:
    name: Railway Containers
    runs-on: ubuntu-latest
    needs: scope
    if: needs.scope.outputs.containers == 'true'
    timeout-minutes: 20
    env:
      DATABASE_RUNTIME_ROLE: companion_runtime
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: companion
          POSTGRES_DB: companion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companion -d companion"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create NOBYPASSRLS runtime database role
        run: |
          docker run --rm --network host postgres:16-alpine \
            psql "$DATABASE_MIGRATION_URL" -v ON_ERROR_STOP=1 -c \
            "DO \$\$ BEGIN
               IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'companion_runtime') THEN
                 CREATE ROLE companion_runtime LOGIN PASSWORD 'companion-runtime'
                   NOSUPERUSER NOBYPASSRLS NOINHERIT;
               END IF;
             END \$\$;
             ALTER ROLE companion_runtime NOSUPERUSER NOBYPASSRLS NOINHERIT;"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/railway/Dockerfile.backend
          build-args: RAILWAY_SERVICE_NAME=api
          tags: companion-api:ci
          load: true
          cache-from: type=gha,scope=railway-api
          cache-to: type=gha,mode=max,scope=railway-api

      - name: Build worker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/railway/Dockerfile.backend
          build-args: RAILWAY_SERVICE_NAME=worker
          tags: companion-worker:ci
          load: true
          cache-from: type=gha,scope=railway-worker
          cache-to: type=gha,mode=max,scope=railway-worker

      - name: Build web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/railway/Dockerfile.web
          build-args: |
            COMPANION_API_URL=http://127.0.0.1:18082
            COMPANION_WEB_URL=http://127.0.0.1:18080
            NEXT_PUBLIC_COMPANION_API_BASE=http://127.0.0.1:18080/v1
          tags: companion-web:ci
          load: true
          cache-from: type=gha,scope=railway-web
          cache-to: type=gha,mode=max,scope=railway-web

      - name: Smoke Railway images
        run: bash scripts/ci-container-smoke.sh

  browser:
    name: Browser Critical Flows
    runs-on: ubuntu-latest
    needs: [scope, application-build]
    if: >-
      always() &&
      needs.scope.result == 'success' &&
      needs.application-build.result == 'success' &&
      needs.scope.outputs.browser == 'true'
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: companion
          POSTGRES_DB: companion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companion -d companion"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CI_USE_GHA_POSTGRES: "1"
      DATABASE_URL: postgres://companion_runtime:companion-runtime@127.0.0.1:5432/companion
      DATABASE_RUNTIME_ROLE: companion_runtime
      COMPANION_API_URL: http://127.0.0.1:13301
      COMPANION_WEB_URL: http://127.0.0.1:13300
      BETTER_AUTH_URL: http://127.0.0.1:13301
      NEXT_PUBLIC_COMPANION_API_URL: http://127.0.0.1:13301
      NEXT_PUBLIC_COMPANION_API_BASE: http://127.0.0.1:13300/v1
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore application build outputs
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-build-${{ runner.os }}-22-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}-${{ github.run_attempt }}

      - name: Restore Playwright Chromium
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.61.1-chromium

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create NOBYPASSRLS runtime database role
        run: |
          docker run --rm --network host postgres:16-alpine \
            psql "$DATABASE_MIGRATION_URL" -v ON_ERROR_STOP=1 -c \
            "DO \$\$ BEGIN
               IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'companion_runtime') THEN
                 CREATE ROLE companion_runtime LOGIN PASSWORD 'companion-runtime'
                   NOSUPERUSER NOBYPASSRLS NOINHERIT;
               END IF;
             END \$\$;
             ALTER ROLE companion_runtime NOSUPERUSER NOBYPASSRLS NOINHERIT;"

      - name: Hydrate application build outputs
        run: pnpm exec turbo run build --output-logs=errors-only

      - name: Install Chromium system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Start browser test stack
        run: bash scripts/ci-rsc-smoke.sh start

      - name: RSC smoke
        run: bash scripts/ci-rsc-smoke.sh rsc

      - name: Critical Playwright flows
        run: bash scripts/ci-rsc-smoke.sh e2e

      - name: Stop browser test stack
        if: always()
        run: bash scripts/ci-rsc-smoke.sh stop

      - name: Upload browser failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-smoke-logs
          path: |
            .context/rsc-smoke/
            playwright-report/
            test-results/
          if-no-files-found: ignore

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: scope
    if: needs.scope.outputs.dependencies == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Audit production dependencies
        # pnpm 9 still calls npm's retired quick/full audit endpoints. Execute pnpm 11 only for
        # this isolated read while keeping the project's package manager pinned at 9.12.0.
        run: pnpm dlx pnpm@11.13.0 --pm-on-fail=ignore audit --prod --audit-level=high

  compatibility-node20:
    name: Compatibility Node 20
    runs-on: ubuntu-latest
    needs: scope
    if: github.event_name == 'push' || github.event_name == 'schedule'
    timeout-minutes: 20
    env:
      COMPANION_API_URL: http://127.0.0.1:13301
      COMPANION_WEB_URL: http://127.0.0.1:13300
      BETTER_AUTH_URL: http://127.0.0.1:13301
      NEXT_PUBLIC_COMPANION_API_URL: http://127.0.0.1:13301
      NEXT_PUBLIC_COMPANION_API_BASE: http://127.0.0.1:13300/v1
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore Node 20 cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-node20-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}-${{ github.run_attempt }}
          restore-keys: turbo-node20-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Node 20 compatibility
        run: pnpm exec turbo run lint typecheck test build --continue=dependencies-successful --output-logs=errors-only

  coverage:
    name: Diagnostic Coverage
    runs-on: ubuntu-latest
    needs: scope
    if: github.event_name == 'schedule'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate diagnostic coverage
        run: pnpm test:coverage --output-logs=errors-only

      - name: Upload coverage summaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: diagnostic-coverage
          path: '**/coverage/coverage-summary.json'
          if-no-files-found: error

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - scope
      - hygiene
      - quality
      - application-build
      - database-integration
      - railway-containers
      - browser
      - dependency-audit
      - compatibility-node20
      - coverage
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify required jobs
        env:
          EVENT_NAME: ${{ github.event_name }}
          JOB_RESULTS: ${{ toJSON(needs) }}
        run: node scripts/ci-gate.mjs
