"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

spotlight_testing = true

[scripts]
setup = "cd \"${CONDUCTOR_ROOT_PATH:-$PWD}\" && corepack enable && pnpm install"
run = "bash scripts/conductor-spotlight.sh run"
