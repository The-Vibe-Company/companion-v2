"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

spotlight_testing = false

[scripts]
setup = "corepack enable && pnpm install && (brew install postgresql@17 minio mailpit || true)"
archive = "bash scripts/dev-conductor.sh archive"
run_mode = "concurrent"

[scripts.run.dev]
command = "bash scripts/dev-conductor.sh"
default = true
icon = "play"

[scripts.run.check]
command = "pnpm verify:change"
icon = "test-tube"
